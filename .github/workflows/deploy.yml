name: Build and Deploy

on:
  push:
    branches:
      - dev
      - qa
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/todolist-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.meta.outputs.branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: meta
        run: |
          BRANCH=${GITHUB_REF#refs/heads/}
          SHA_SHORT=${GITHUB_SHA::7}
          echo "version=${BRANCH}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.branch }}-latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy with Helm
        run: |
          NAMESPACE="${{ needs.build-and-push.outputs.branch }}"
          # main -> prod
          if [ "$NAMESPACE" = "main" ]; then NAMESPACE="prod"; fi

          helm upgrade --install todo-$NAMESPACE ./todo-chart \
            --namespace $NAMESPACE \
            --set image.tag=${{ needs.build-and-push.outputs.branch }}-latest