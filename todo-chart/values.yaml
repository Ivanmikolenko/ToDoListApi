replicaCount: 1

image:
  repository: ivanmikolenko/todolist-api
  tag: main-latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

readinessProbe:
  httpGet:
    path: /swagger
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /swagger
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20